<div class="sub-header-bar bg-white border-bottom d-flex align-items-center">
  <div class="container-fluid d-flex align-items-center justify-content-between sub-header-container">

    <h1 class="sub-header-title m-0">{{ currentTitle() }}</h1>

    <div class="right-actions-container d-flex align-items-center">

      <button type="button" class="action-icon-btn me-3" (click)="navigateTo('/notificaciones')" title="Notificaciones">
        <img src="notification.png" alt="Campana de Notificaciones" class="icon-img-generic">
      </button>

      @if (isLoggedIn()) {
        <div class="profile-menu-wrapper">

          <button type="button" class="action-icon-btn profile-avatar-btn" (click)="toggleMenu()" title="Menú de usuario">
            <img src="user.png" alt="Avatar de Perfil" class="profile-img-generic">
          </button>

          @if (isMenuOpen()) {
            <div class="custom-dropdown-menu">
              <button type="button" class="dropdown-item-btn" (click)="navigateTo('/perfil')">
                Mi Perfil
              </button>
              <button type="button" class="dropdown-item-btn" (click)="navigateTo('/configuracion')">
                Configuración
              </button>
              <div class="dropdown-divider"></div>
              <button type="button" class="dropdown-item-btn logout-btn" (click)="onLogout()">
                Cerrar Sesión
              </button>
            </div>
          }
        </div>
      }
    </div>
  </div>
</div>
