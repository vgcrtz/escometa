
<div class="bg-image" style="background-image: url('Background_IMG.jpg');">
  <!--Div global-->
  <div class="login-card">
    <!--Div del panel (fondo blanco)-->
    <div class="div-izq">
      <!--Div izquierdo-->
      <div class="text-center">
        <h5 class="mb-1 fw-bold text-secondary" style="padding-bottom: 5%">INICIA SESIÓN</h5>
        <hr class="title-divider">
      </div>
      <form>
        <div class="row mb-3 align-items-center">
          <div class="col-4">
            <label for="correo" class="form-label mb-0" style="font-size: 12px;">Correo electrónico:</label>
          </div>

          <div class="col-8">
            <input type="email" class="form-control " id="correo"/>
          </div>

        </div>

        <div class="row mb-4 align-items-center">
          <div class="col-4">
            <label for="pswd" class="form-label mb-0" style="font-size: 12px;">Contraseña:</label>
          </div>

          <div class="col-8">
            <input type="password" class="form-control " id="pswd">
          </div>
          <a style="font-size: 10px; text-align: right" href="">¿Olvidaste tu contraseña?</a>
        </div>

        <div class="text-center">
          <div>
            <input type="checkbox" style="margin-right: 3%">
            <label>Recuérdame</label>
          </div>

          <button class="btn-custom">
            Ingresar
          </button>
          <p style="font-size: 13px;">
            ¿No tienes cuenta? <a  href="">Regístrate</a>
          </p>

        </div>
      </form>
    </div>

    <div class="div-der">
      <!--Div derecho-->
      <div class="text-center">
        <h5 class="mb-1 fw-bold text-secondary" style="padding-bottom: 5%">UNIRSE COMO INVITADO</h5>
        <hr class="title-divider">
      </div>

      <div class="text-center">
        <p class="text-der">Los invitados pueden consultar información y procesos,
          además de visualizar anuncios globales pero no tienen acceso a chats privados o grupos.</p>

        <button class="btn-custom">
          Entrar
        </button>
      </div>

    </div>
  </div>
</div>
