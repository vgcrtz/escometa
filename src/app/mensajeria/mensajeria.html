<div class="conversaciones-page">
  <div class="pt-3 bg-white ps-3">
    <h2 class="m-0 text-dark fs-4">CONVERSACIONES</h2>
    <hr class="mt-2 mb-0 border-secondary">
  </div>

  <div class="d-flex layout-container">
    <div class="sidebar border-end d-flex flex-column bg-white">

      <div class="d-flex justify-content-between align-items-center ps-3 pe-2 py-2 border-bottom">
        <h2 class="m-0 text-dark fs-4">GRUPOS</h2>
        <i class="bi bi-gear text-dark fs-5"></i>
      </div>

      <div class="grupo-vacio text-center text-secondary d-flex align-items-center justify-content-center border-bottom">
        <span>No has sido añadido a un<br>grupo.</span>
      </div>

      <div class="d-flex justify-content-between align-items-center ps-3 pe-2 py-2 border-bottom">
        <h2 class="m-0 text-dark fs-4">PRIVADO</h2>
        <div>
          <i class="bi bi-plus-circle text-dark fs-5 me-2"></i>
          <i class="bi bi-gear text-dark fs-5"></i>
        </div>
      </div>

      <div class="d-flex align-items-center ps-3 pe-2 py-2 border-bottom">
        <i class="bi bi-person-circle fs-3 me-2 text-dark"></i>
        <span class="text-dark">Usuario X</span>
      </div>

    </div>

    <div class="chat-area d-flex flex-column w-100 bg-white">
      <div class="flex-grow-1 d-flex justify-content-center align-items-center text-secondary main-chat-box">
        <span class="text-center">Inicia una<br>conversación</span>
      </div>

      <div class="chat-input-bar bg-white border-top border-2 p-3">
        <div class="input-group align-items-center">
          <input type="text" class="form-control rounded-pill bg-light border-0 me-2 input-texto">
          <button class="btn btn-link p-0 text-secondary border-0" type="button">
            <i class="bi bi-plus-circle fs-3 text-dark"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
