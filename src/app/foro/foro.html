<div class="foro-page-container">
  <div class="foro-header pt-3 ps-4 mb-3">
    <h2 class="foro-title m-0 text-secondary" style="padding-bottom: 1%">FORO</h2>
    <hr class="foro-title-divider m-0">
  </div>

  <div class="container chat-main-container">
    <div class="card chat-panel-card shadow-sm">

      <div class="card-body chat-body-scroller">

        <div class="message message-incoming d-flex align-items-center mb-3">
          <i class="bi bi-person-circle user-icon-incoming me-2"></i>
          <div class="bubble bubble-incoming p-3 text-secondary">
            Hola
          </div>
        </div>

        <div class="message message-incoming d-flex align-items-center mb-3">
          <i class="bi bi-person-circle user-icon-incoming me-2"></i>
          <div class="bubble bubble-incoming p-3 text-secondary">
            Hola
          </div>
        </div>

        <div class="message message-incoming d-flex align-items-center mb-3">
          <i class="bi bi-person-circle user-icon-incoming me-2"></i>
          <div class="bubble bubble-incoming p-3 text-secondary">
            Hola
          </div>
        </div>

        <div class="message message-incoming d-flex align-items-center mb-3">
          <i class="bi bi-person-circle user-icon-incoming me-2"></i>
          <div class="bubble bubble-incoming p-3 text-secondary">
            Hola
          </div>
        </div>

        <div class="message message-outgoing d-flex align-items-center justify-content-end mb-3">
          <div class="bubble bubble-outgoing p-3 text-white">
            Hola
          </div>
          <i class="bi bi-person-circle user-icon-outgoing ms-2"></i>
        </div>

      </div>
      <div class="card-footer chat-input-bar bg-white border-top">
        <div class="input-group align-items-center p-2">
          <input type="text" class="form-control rounded-pill input-text-area me-2" placeholder="Ingresa algo...">
          <button class="btn btn-link btn-add p-0" type="button">
            <i class="bi bi-plus-circle-fill text-secondary"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
